{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Markab | Premium Marketplace{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Standard CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2.6">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #B12241;
            --primary-soft: #FCE8E6;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border: #EEEEEE;
            --nav-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #BBBBBB;
            --border: #2C2C2C;
            --nav-bg: #1E1E1E;
            --primary-soft: rgba(177, 34, 65, 0.2);
        }

        body { background: var(--bg); color: var(--text-main); transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s; font-family: 'Outfit', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        header { background: var(--nav-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; padding: 12px 0; transition: background 0.3s; }
        
        .search-bar { flex: 1; display: flex; max-width: 500px; margin: 0 20px; }
        .search-input { width: 100%; padding: 10px 18px; border-radius: 12px 0 0 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); outline: none; font-weight: 700; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 0 18px; border-radius: 0 12px 12px 0; cursor: pointer; }

        .header-icon-btn { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); font-size: 11px; font-weight: 800; gap: 4px; border: none; background: none; cursor: pointer; transition: 0.2s; }
        .header-icon-btn:hover { color: var(--primary); }
        .header-icon-btn svg { width: 22px; height: 22px; stroke-width: 2.5; }

        /* Floating Button */
        .floating-contact { position: fixed; bottom: 100px; right: 25px; z-index: 1500; display: flex; flex-direction: column; gap: 12px; }
        .contact-trigger { width: 56px; height: 56px; border-radius: 18px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(177,34,65,0.4); cursor: pointer; }
        
        /* Dark mode compatibility fixes for cards */
        .compact-card, .premium-card, .stat-card, .about-card, .region-card { background: var(--card-bg) !important; color: var(--text-main) !important; border-color: var(--border) !important; }
        .compact-title, .menu-label, .footer-title { color: var(--text-main) !important; }
        .compact-seller, .footer-link { color: var(--text-muted) !important; }

        @media (max-width: 768px) {
            .search-bar, .hide-on-mobile { display: none !important; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <div id="about-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(8px);" onclick="this.style.display='none'">
        <div class="about-card animate" style="background:var(--card-bg); padding:40px; border-radius:30px; width:90%; max-width:500px; text-align:center; border:1px solid var(--border);" onclick="event.stopPropagation()">
            <h2 id="about-title" style="font-size:26px; font-weight:900; margin-bottom:15px;">Markab Haqida</h2>
            <p id="about-text" style="color:var(--text-muted); font-weight:700; line-height:1.6; margin-bottom:25px;">Markab Electronics — premium iPhone marketplace.</p>
            <button onclick="document.getElementById('about-modal').style.display='none'" class="btn-primary" style="width:100%; padding:15px; border-radius:15px;" id="about-close">TUSHUNARLI</button>
        </div>
    </div>

    <header>
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="{% url 'phones:home' %}"><img src="{% static 'images/logo_.png' %}" style="height: 36px;"></a>
                <a href="{% url 'phones:catalog' %}" class="btn-primary hide-on-mobile" style="padding: 10px 15px; font-size: 13px; border-radius: 10px; gap: 5px;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <span id="nav-catalog">Katalog</span>
                </a>
            </div>

            <form action="{% url 'phones:search' %}" method="GET" class="search-bar">
                <input type="text" name="q" id="search-placeholder" class="search-input">
                <button type="submit" class="search-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
            </form>

            <div style="display: flex; align-items: center; gap: 18px;">
                <button onclick="toggleLang()" class="header-icon-btn">
                    <span id="lang-flag" style="font-size: 18px;">🇺🇿</span>
                    <span id="lang-label">UZ</span>
                </button>
                <button onclick="toggleTheme()" class="header-icon-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span id="theme-label">Tun</span>
                </button>
                <button onclick="document.getElementById('about-modal').style.display='flex'" class="header-icon-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="about-btn-label">Haqida</span>
                </button>
                <a href="{% url 'phones:cart' %}" class="header-icon-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span id="cart-label">Savat</span>
                    <span id="cart-count" style="display:none; position:absolute; top:-5px; right:-2px; background:var(--primary); color:white; font-size:9px; width:15px; height:15px; border-radius:50%; display:flex; align-items:center; justify-content:center;">0</span>
                </a>
                <a href="{% url 'users:profile' %}" class="header-icon-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="profile-label">Profil</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 30px 20px 80px;">
        {% block content %}{% endblock %}
    </main>

    <div class="floating-contact">
        <div id="contact-options" style="display:none; flex-direction:column; gap:10px; margin-bottom:10px;">
            <a href="tel:+998901234567" style="background:#22C55E; width:48px; height:48px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; text-decoration:none;">📞</a>
            <a href="https://t.me/markab_admin" target="_blank" style="background:#0088cc; width:48px; height:48px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; text-decoration:none;">✈️</a>
        </div>
        <div class="contact-trigger" onclick="const o=document.getElementById('contact-options'); o.style.display=o.style.display==='flex'?'none':'flex'">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
    </div>

    <script>
        const translations = {
            uz: {
                catalog: "Katalog", search: "Telefonlarni qidirish...", about: "Haqida",
                cart: "Savat", profile: "Profil", theme_dark: "Tun", theme_light: "Kun",
                about_title: "Markab Haqida", about_close: "TUSHUNARLI",
                about_text: "Markab Electronics — O'zbekiston bozorida 5 yildan buyon faoliyat yurituvchi premium iPhone do'koni. Biz faqat original va ishonchli texnikalarni taqdim etamiz.",
                sell_phone: "Telefon sotish", sell_desc: "Tezda baholash va naqd to'lov", start: "Boshlash",
                free_price: "Bepul baholash", price_desc: "2 daqiqada narxni biling", pricing: "Baholash",
                sell: "Sotish", nasiya: "Nasiya", promos: "Aksiya",
                promos_filter: "🔥 AKSIYALAR", new_ads: "Yangi e'lonlar",
                all_products: "Barcha mahsulotlar", promo_products: "Aksiya Mahsulotlari",
                empty_products: "Hozircha mahsulot topilmadi"
            },
            ru: {
                catalog: "Каталог", search: "Поиск телефонов...", about: "О нас",
                cart: "Корзина", profile: "Профиль", theme_dark: "Ночь", theme_light: "День",
                about_title: "О Markab", about_close: "ПОНЯТНО",
                about_text: "Markab Electronics — премиальный магазин iPhone, работающий на рынке Узбекистана более 5 лет. Мы предлагаем только оригинальную и надежную технику.",
                sell_phone: "Продать телефон", sell_desc: "Быстрая оценка и наличные", start: "Начать",
                free_price: "Бесплатная оценка", price_desc: "Узнайте цену за 2 минуты", pricing: "Оценить",
                sell: "Продать", nasiya: "Рассрочка", promos: "Акции",
                promos_filter: "🔥 АКЦИИ", new_ads: "Новые объявления",
                all_products: "Все товары", promo_products: "Акционные товары",
                empty_products: "Пока нет товаров"
            }
        };

        function updateUI() {
            const lang = localStorage.getItem('lang') || 'uz';
            const theme = localStorage.getItem('theme') || 'light';
            const t = translations[lang];

            document.documentElement.setAttribute('data-theme', theme);
            
            // Header Translations
            if(document.getElementById('nav-catalog')) document.getElementById('nav-catalog').innerText = t.catalog;
            if(document.getElementById('search-placeholder')) document.getElementById('search-placeholder').placeholder = t.search;
            if(document.getElementById('about-btn-label')) document.getElementById('about-btn-label').innerText = t.about;
            if(document.getElementById('cart-label')) document.getElementById('cart-label').innerText = t.cart;
            if(document.getElementById('profile-label')) document.getElementById('profile-label').innerText = t.profile;
            if(document.getElementById('lang-label')) document.getElementById('lang-label').innerText = lang.toUpperCase();
            if(document.getElementById('lang-flag')) document.getElementById('lang-flag').innerText = lang === 'uz' ? '🇺🇿' : '🇷🇺';
            if(document.getElementById('theme-label')) document.getElementById('theme-label').innerText = theme === 'dark' ? t.theme_dark : t.theme_light;
            if(document.getElementById('about-title')) document.getElementById('about-title').innerText = t.about_title;
            if(document.getElementById('about-text')) document.getElementById('about-text').innerText = t.about_text;
            if(document.getElementById('about-close')) document.getElementById('about-close').innerText = t.about_close;

            // Generic elements translation
            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.getAttribute('data-lang-key');
                if (t[key]) {
                    el.innerText = t[key];
                }
            });
        }

        function toggleLang() {
            const current = localStorage.getItem('lang') || 'uz';
            localStorage.setItem('lang', current === 'uz' ? 'ru' : 'uz');
            updateUI();
        }

        function toggleTheme() {
            const current = localStorage.getItem('theme') || 'light';
            localStorage.setItem('theme', current === 'light' ? 'dark' : 'light');
            updateUI();
        }

        // Initialize
        updateUI();
        
        function updateCartUI() {
            const cart = JSON.parse(localStorage.getItem('markab-cart') || '[]');
            const countEl = document.getElementById('cart-count');
            if (cart.length > 0) { countEl.innerText = cart.length; countEl.style.display = 'flex'; }
            else { countEl.style.display = 'none'; }
        }
        updateCartUI();
    </script>
</body>
</html>
