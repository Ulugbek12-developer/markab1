{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Markab | Premium Marketplace{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Standard CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2.9">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #B12241;
            --primary-soft: #FCE8E6;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border: #EEEEEE;
            --nav-bg: #FFFFFF;
            --input-bg: #F9F9F9;
        }

        [data-theme="dark"] {
            --bg: #0A0A0A;
            --card-bg: #161616;
            --text-main: #F5F5F5;
            --text-muted: #A0A0A0;
            --border: #222222;
            --nav-bg: #0F0F0F;
            --input-bg: #1E1E1E;
            --primary-soft: rgba(177, 34, 65, 0.15);
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            transition: background 0.3s, color 0.3s; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
            padding-bottom: 70px; 
            font-weight: 400; /* Thinner default font */
            letter-spacing: -0.01em;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* Optimized Header Layout */
        header { background: var(--nav-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; padding: 12px 0; }
        .nav-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        
        .logo-area { flex-shrink: 0; }
        .logo-area img { height: 32px; width: auto; }

        .search-area { flex: 1; max-width: 600px; position: relative; }
        .search-input { 
            width: 100%; 
            padding: 11px 15px 11px 42px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
            background: var(--input-bg); 
            color: var(--text-main); 
            font-weight: 500; 
            outline: none; 
            transition: 0.2s; 
            font-size: 14px;
        }
        .search-input:focus { border-color: var(--primary); background: var(--bg); box-shadow: 0 0 0 4px var(--primary-soft); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .header-actions { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .header-btn { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 3px; 
            font-weight: 600; 
            font-size: 10px; 
            opacity: 0.85;
            transition: 0.2s;
        }
        .header-btn:hover { opacity: 1; color: var(--primary); }
        .header-btn svg { width: 22px; height: 22px; stroke-width: 1.8; } /* Thinner icons */

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 68px; 
            background: var(--nav-bg); border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 2000; padding-bottom: env(safe-area-inset-bottom);
            backdrop-filter: blur(10px);
        }
        .nav-tab { 
            text-decoration: none; color: var(--text-muted); 
            display: flex; flex-direction: column; align-items: center; 
            gap: 5px; font-size: 11px; font-weight: 600; transition: 0.2s;
        }
        .nav-tab.active { color: var(--primary); }
        .nav-tab svg { width: 24px; height: 24px; stroke-width: 1.8; }

        /* Floating Contact */
        .floating-group { position: fixed; bottom: 85px; right: 20px; z-index: 1500; display: flex; flex-direction: column; gap: 12px; }
        .float-btn { width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-decoration: none; }
        .btn-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
        .btn-phone { background: #22C55E; }
        .btn-msg { background: var(--primary); }

        @media (max-width: 768px) {
            .nav-wrapper { gap: 10px; }
            .logo-area img { height: 24px; }
            .search-area { max-width: none; }
            .search-input { padding: 9px 12px 9px 35px; font-size: 13px; border-radius: 12px; }
            .search-icon { left: 10px; }
            .header-btn { gap: 0; }
            .header-btn span { display: none; }
            .header-actions { gap: 10px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="nav-wrapper">
                <!-- Left: Logo -->
                <div class="logo-area">
                    <a href="{% url 'phones:home' %}">
                        <img src="{% static 'images/logo_.png' %}" alt="Markab">
                    </a>
                </div>

                <!-- Center: Search -->
                <form action="{% url 'phones:search' %}" method="GET" class="search-area">
                    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" name="q" id="search-placeholder" class="search-input" placeholder="Telefonlarni qidirish...">
                </form>
                
                <!-- Right: Actions -->
                <div class="header-actions">
                    <button onclick="toggleLang()" class="header-btn">
                        <span id="lang-flag" style="font-size: 18px;">🇺🇿</span>
                        <span id="lang-label">UZ</span>
                    </button>
                    <button onclick="toggleTheme()" class="header-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        <span id="theme-label">Tun</span>
                    </button>
                    <button onclick="document.getElementById('about-modal').style.display='flex'" class="header-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="about-btn-label">Haqida</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 20px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="bottom-nav">
        <a href="{% url 'phones:home' %}" class="nav-tab active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span data-lang-key="home">Bosh</span>
        </a>
        <a href="{% url 'phones:catalog' %}" class="nav-tab">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            <span data-lang-key="catalog">Katalog</span>
        </a>
        <a href="{% url 'phones:cart' %}" class="nav-tab" style="position: relative;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span data-lang-key="cart">Savat</span>
            <span id="cart-count" style="display:none; position:absolute; top:-2px; right:15px; background:var(--primary); color:white; font-size:8px; width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center;">0</span>
        </a>
        <a href="{% url 'users:profile' %}" class="nav-tab">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span data-lang-key="profile">Profil</span>
        </a>
    </nav>

    <!-- Floating Contacts -->
    <div class="floating-group">
        <a href="tel:+998958689555" class="float-btn btn-phone">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
        </a>
        <a href="https://www.instagram.com/markab_electronics/" target="_blank" class="float-btn btn-insta">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zM17.5 6.5h.01"></path></svg>
        </a>
        <div class="float-btn btn-msg" onclick="const o=document.getElementById('contact-options'); o.style.display=o.style.display==='flex'?'none':'flex'">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
        <div id="contact-options" style="display:none; flex-direction:column; gap:10px;">
            <a href="https://t.me/markab_admin" target="_blank" style="background:#0088cc; width:50px; height:50px; border-radius:16px; display:flex; align-items:center; justify-content:center; color:white; text-decoration:none;"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 2L2 11l8 3 3 8 8-18z"></path></svg></a>
        </div>
    </div>

    <!-- About Modal -->
    <div id="about-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(10px);" onclick="this.style.display='none'">
        <div style="background:var(--card-bg); padding:40px; border-radius:30px; width:90%; max-width:450px; text-align:center; border:1px solid var(--border);" onclick="event.stopPropagation()">
            <h2 id="about-title" style="font-size:24px; font-weight:900; margin-bottom:15px;">Markab Haqida</h2>
            <p id="about-text" style="color:var(--text-muted); font-weight:700; line-height:1.6; margin-bottom:25px;">Markab Electronics — premium marketplace.</p>
            <button onclick="document.getElementById('about-modal').style.display='none'" class="btn-primary" style="width:100%; padding:15px; border-radius:15px;" id="about-close">TUSHUNARLI</button>
        </div>
    </div>

    <script>
        const translations = {
            uz: {
                home: "Bosh", catalog: "Katalog", cart: "Savat", profile: "Profil",
                search: "Telefonlarni qidirish...", about: "Haqida", theme_dark: "Tun", theme_light: "Kun",
                about_title: "Markab Haqida", about_close: "TUSHUNARLI",
                about_text: "Markab Electronics — O'zbekistondagi eng premium iPhone marketplace. Biz faqat original va kafolatlangan texnikalarni taqdim etamiz."
            },
            ru: {
                home: "Главная", catalog: "Каталог", cart: "Корзина", profile: "Профиль",
                search: "Поиск телефонов...", about: "О нас", theme_dark: "Ночь", theme_light: "День",
                about_title: "О Markab", about_close: "ПОНЯТНО",
                about_text: "Markab Electronics — премиальный маркетплейс iPhone в Узбекистане. Мы предлагаем только оригинальную и гарантированную технику."
            }
        };

        function updateUI() {
            const lang = localStorage.getItem('lang') || 'uz';
            const theme = localStorage.getItem('theme') || 'light';
            const t = translations[lang];

            document.documentElement.setAttribute('data-theme', theme);
            
            if(document.getElementById('search-placeholder')) document.getElementById('search-placeholder').placeholder = t.search;
            if(document.getElementById('about-btn-label')) document.getElementById('about-btn-label').innerText = t.about;
            if(document.getElementById('lang-label')) document.getElementById('lang-label').innerText = lang.toUpperCase();
            if(document.getElementById('lang-flag')) document.getElementById('lang-flag').innerText = lang === 'uz' ? '🇺🇿' : '🇷🇺';
            if(document.getElementById('theme-label')) document.getElementById('theme-label').innerText = theme === 'dark' ? t.theme_dark : t.theme_light;
            if(document.getElementById('about-title')) document.getElementById('about-title').innerText = t.about_title;
            if(document.getElementById('about-text')) document.getElementById('about-text').innerText = t.about_text;
            if(document.getElementById('about-close')) document.getElementById('about-close').innerText = t.about_close;

            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.getAttribute('data-lang-key');
                if (t[key]) el.innerText = t[key];
            });
        }

        function toggleLang() {
            localStorage.setItem('lang', (localStorage.getItem('lang') || 'uz') === 'uz' ? 'ru' : 'uz');
            updateUI();
        }

        function toggleTheme() {
            localStorage.setItem('theme', (localStorage.getItem('theme') || 'light') === 'light' ? 'dark' : 'light');
            updateUI();
        }

        updateUI();
        
        function updateCartUI() {
            const cart = JSON.parse(localStorage.getItem('markab-cart') || '[]');
            const countEl = document.getElementById('cart-count');
            if (cart && cart.length > 0) { countEl.innerText = cart.length; countEl.style.display = 'flex'; }
            else { countEl.style.display = 'none'; }
        }
        updateCartUI();
    </script>
</body>
</html>
