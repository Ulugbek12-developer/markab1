{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Kirish - Markab Electronics{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="glass p-10 rounded-[40px] w-full max-w-md border-white/10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand to-brand-light shadow-[0_0_20px_rgba(195,39,77,0.5)]"></div>
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-brand/10 rounded-full mb-6">
                <svg class="w-8 h-8 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tighter uppercase">ADMIN <span class="text-brand">PANEL</span></h1>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">Xavfsiz kirish tizimi</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Boshqaruv paroli</label>
                <input type="password" name="password" required 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none focus:border-brand transition-all text-white text-center text-lg tracking-widest"
                       placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-brand/20 btn-glow tracking-widest text-sm">
                TIZIMGA KIRISH
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-white/5 text-center">
            <a href="{% url 'phones:home' %}" class="text-xs text-gray-500 hover:text-white transition-colors uppercase font-bold tracking-widest">
                Saytga qaytish
            </a>
        </div>
    </div>
</div>
{% endblock %}
