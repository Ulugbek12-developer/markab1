{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Kirish — Markab Electronics{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:24px 16px;">
    <div class="card" style="padding:32px; width:100%; max-width:360px; position:relative; overflow:hidden;">
        <div style="position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, white, rgba(255,255,255,0.3));"></div>

        <div class="text-center" style="margin-bottom:32px;">
            <div style="width:56px; height:56px; background:rgba(255,255,255,0.15); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px;">🔐</div>
            <h1 style="font-size:22px; font-weight:900; color:white;">Admin Panel</h1>
            <p style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:4px;">Faqat vakolatli shaxslar uchun</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label style="display:block; font-size:10px; font-weight:800; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;">🔑 Parol</label>
                <input type="password" name="password" required autofocus class="input-field" style="text-align:center; font-size:18px; letter-spacing:0.3em; padding:14px;" placeholder="••••••••">
            </div>
            <button type="submit" style="width:100%; background:white; color:#C0143C; padding:14px; border-radius:14px; font-weight:900; font-size:14px; border:none; cursor:pointer; text-transform:uppercase; letter-spacing:0.08em;">
                🚀 Kirish
            </button>
        </form>

        <div style="margin-top:24px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.1); text-align:center;">
            <a href="{% url 'phones:home' %}" style="font-size:11px; color:rgba(255,255,255,0.5); text-decoration:none; font-weight:700;">← Saytga qaytish</a>
        </div>
    </div>
</div>
{% endblock %}
