{% extends 'base.html' %}
{% load static %}

{% block title %}Mahsulot Qo'shish - Markab Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="mb-8">
        <a href="{% url 'phones:admin_dashboard' %}" class="text-gray-400 hover:text-brand transition-all flex items-center text-sm font-bold tracking-widest uppercase">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Dashboardga qaytish
        </a>
    </div>

    <div class="glass p-10 rounded-[40px] border-white/10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand to-brand-light"></div>
        
        <h1 class="text-4xl font-black mb-10 tracking-tighter">YANGI <span class="text-brand">MAHSULOT</span></h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Model -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Model nomi</label>
                    <select name="model_name" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white appearance-none cursor-pointer">
                        {% for val, label in form.fields.model_name.choices %}
                            <option value="{{ val }}" class="bg-dark-card">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Branch -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Filial</label>
                    <select name="branch" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white appearance-none cursor-pointer">
                        {% for val, label in form.fields.branch.choices %}
                            <option value="{{ val }}" class="bg-dark-card">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Memory -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Xotira</label>
                    <select name="memory" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white appearance-none cursor-pointer">
                        {% for val, label in form.fields.memory.choices %}
                            <option value="{{ val }}" class="bg-dark-card">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Battery -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Batareya quvvati (%)</label>
                    <input type="number" name="battery_health" value="100" required 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white"
                           placeholder="95">
                </div>

                <!-- Condition -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Holati</label>
                    <select name="condition" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white appearance-none cursor-pointer">
                        {% for val, label in form.fields.condition.choices %}
                            <option value="{{ val }}" class="bg-dark-card">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Price -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Narxi (so'm)</label>
                    <input type="number" name="price" required 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white"
                           placeholder="12 500 000">
                </div>
            </div>

            <!-- Image Upload -->
            <div class="relative group">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Mahsulot rasmi</label>
                <div class="w-full bg-white/5 border-2 border-dashed border-white/10 rounded-3xl p-8 text-center hover:border-brand/50 transition-all cursor-pointer relative">
                    <input type="file" name="image" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <svg class="w-10 h-10 mx-auto text-gray-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-sm text-gray-400 font-medium">Rasm tanlash uchun bosing yoki sudrab keling</p>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 ml-1">Tavsif (Ixtiyoriy)</label>
                <textarea name="description" rows="3" 
                          class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-brand transition-all text-white resize-none"
                          placeholder="Qo'shimcha ma'lumotlar..."></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white font-black py-5 rounded-2xl transition-all shadow-2xl shadow-brand/20 btn-glow text-sm tracking-widest">
                MAHSULOTNI JOYLASHTIRISH
            </button>
        </form>
    </div>
</div>
{% endblock %}
