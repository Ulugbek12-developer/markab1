{% extends 'base.html' %}
{% load static %}

{% block title %}Mahsulot Qo'shish — Markab Admin{% endblock %}

{% block content %}
<div class="animate">

    <!-- Back Button -->
    <div style="margin-bottom:20px;">
        <a href="{% url 'phones:admin_dashboard' %}" style="display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); text-decoration:none; font-size:13px; font-weight:800;">
            ← Dashboardga qaytish
        </a>
    </div>

    <!-- Card -->
    <div class="premium-card" style="padding:24px; border-top:4px solid var(--primary);">

        <h1 style="font-size:22px; font-weight:900; color:var(--text-main); margin-bottom:24px;">
            ➕ Yangi <span style="color:var(--primary);">Mahsulot</span>
        </h1>

        <form method="POST" enctype="multipart/form-data" style="display:flex; flex-direction:column; gap:18px;">
            {% csrf_token %}

            <!-- Model -->
            <div>
                <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">📱 Model nomi</label>
                <select name="model_name" required style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main); appearance:auto;">
                    {% for val, label in form.fields.model_name.choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Memory + Battery in 2 cols -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
                <div>
                    <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">💾 Xotira</label>
                    <select name="memory" required style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);">
                        {% for val, label in form.fields.memory.choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">🔋 Batareya (%)</label>
                    <input type="number" name="battery_health" value="100" min="1" max="100" required
                           style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);"
                           placeholder="95">
                </div>
            </div>

            <!-- Condition -->
            <div>
                <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">🛠️ Holati</label>
                <select name="condition" required style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);">
                    {% for val, label in form.fields.condition.choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Price + Color -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
                <div>
                    <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">💰 Narxi ($)</label>
                    <input type="number" name="price" required
                           style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);"
                           placeholder="12500000">
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">🎨 Rang</label>
                    <input type="text" name="color"
                           style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);"
                           placeholder="Space Gray">
                </div>
            </div>

            <!-- Region -->
            <div>
                <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">🌍 Region</label>
                <input type="text" name="region"
                       style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main);"
                       placeholder="USA, EU...">
            </div>

            <!-- Image Upload -->
            <div>
                <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">🖼️ Mahsulot rasmi</label>
                <div style="position:relative;">
                    <input type="file" name="image" id="imageUpload" accept="image/*"
                           style="position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:pointer; z-index:10;"
                           onchange="updateFileName(this)">
                    <div id="uploadBox" style="border:2px dashed var(--border); border-radius:16px; padding:24px; text-align:center; transition:all 0.3s;">
                        <span style="font-size:32px; display:block; margin-bottom:8px;">📷</span>
                        <p id="fileLabel" style="font-weight:700; color:var(--text-muted); font-size:13px;">Rasm tanlash uchun bosing</p>
                        <p style="font-size:11px; color:#bbb; margin-top:4px;">JPG, PNG, WEBP</p>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label style="display:block; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">📝 Tavsif</label>
                <textarea name="description" rows="3"
                          style="width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; background:#fff; color:var(--text-main); resize:none; font-family:inherit;"
                          placeholder="Qo'shimcha ma'lumotlar..."></textarea>
            </div>

            <!-- Hidden Branch -->
            <input type="hidden" name="branch" value="malika">

            <!-- Submit -->
            <button type="submit" class="btn-primary" style="width:100%; font-size:15px; font-weight:900; letter-spacing:0.5px; padding:16px;">
                ✅ Mahsulotni Saqlash
            </button>

        </form>
    </div>
</div>

<script>
function updateFileName(input) {
    const label = document.getElementById('fileLabel');
    const box = document.getElementById('uploadBox');
    if (input.files && input.files[0]) {
        label.textContent = '✅ ' + input.files[0].name;
        box.style.borderColor = 'var(--primary)';
        box.style.background = 'rgba(177,34,65,0.03)';
    }
}
</script>
{% endblock %}
