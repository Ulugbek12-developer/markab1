{% extends 'base.html' %}
{% load static %}

{% block title %}Mahsulot Qo'shish — Markab Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8 px-4">
    <div class="mb-6">
        <a href="{% url 'phones:admin_dashboard' %}" class="inline-flex items-center gap-2 text-gray-500 hover:text-brand transition-colors text-sm font-bold">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Dashboardga qaytish
        </a>
    </div>

    <div class="card p-8 relative overflow-hidden">
        <!-- Top accent line -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-brand to-brand-light"></div>

        <h1 class="text-3xl font-black text-gray-900 mb-8">
            ➕ Yangi <span class="text-gradient">Mahsulot</span>
        </h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Model -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">📱 Model nomi</label>
                    <select name="model_name" required class="input-field">
                        {% for val, label in form.fields.model_name.choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Memory -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">💾 Xotira</label>
                    <select name="memory" required class="input-field">
                        {% for val, label in form.fields.memory.choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Battery -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">🔋 Batareya (%)</label>
                    <input type="number" name="battery_health" value="100" min="1" max="100" required
                           class="input-field" placeholder="95">
                </div>

                <!-- Condition -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">🛠️ Holati</label>
                    <select name="condition" required class="input-field">
                        {% for val, label in form.fields.condition.choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Price -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">💰 Narxi (so'm)</label>
                    <input type="number" name="price" required class="input-field" placeholder="12500000">
                </div>

                <!-- Color -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">🎨 Rang (ixtiyoriy)</label>
                    <input type="text" name="color" class="input-field" placeholder="Space Gray">
                </div>

                <!-- Region -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">🌍 Region (ixtiyoriy)</label>
                    <input type="text" name="region" class="input-field" placeholder="USA, EU...">
                </div>
            </div>

            <!-- Image Upload -->
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">🖼️ Mahsulot rasmi</label>
                <div class="relative">
                    <input type="file" name="image" id="imageUpload" accept="image/*"
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                           onchange="updateFileName(this)">
                    <div class="border-2 border-dashed border-surface-border rounded-2xl p-8 text-center hover:border-brand/50 hover:bg-brand/5 transition-all cursor-pointer">
                        <span class="text-4xl block mb-3">📷</span>
                        <p class="font-bold text-gray-600" id="fileLabel">Rasm tanlash uchun bosing</p>
                        <p class="text-xs text-gray-400 mt-1">JPG, PNG, WEBP</p>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">📝 Tavsif (ixtiyoriy)</label>
                <textarea name="description" rows="3" class="input-field resize-none"
                          placeholder="Qo'shimcha ma'lumotlar..."></textarea>
            </div>

            <!-- Hidden branch (always malika) -->
            <input type="hidden" name="branch" value="malika">

            <button type="submit" class="btn-primary w-full font-black uppercase tracking-wide">
                ✅ Mahsulotni Saqlash
            </button>
        </form>
    </div>
</div>

<script>
function updateFileName(input) {
    const label = document.getElementById('fileLabel');
    if (input.files && input.files[0]) {
        label.textContent = '✅ ' + input.files[0].name;
    }
}
</script>
{% endblock %}
