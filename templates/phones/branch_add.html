{% extends 'base.html' %}

{% block title %}Filial Qo'shish | Markab{% endblock %}

{% block content %}
<div class="animate" style="max-width: 600px; margin: 40px auto;">
    <div class="premium-card" style="padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size:32px; font-weight:900;">Yangi Filial Qo'shish</h1>
            <p style="color:var(--text-muted); font-weight:700; margin-top:10px;">Do'konlar tarmog'ingizni kengaytiring</p>
        </div>

        <form method="POST" style="display:flex; flex-direction:column; gap:20px;">
            {% csrf_token %}
            
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Filial nomi <span style="color:var(--primary);">*</span></label>
                <input type="text" name="name" required placeholder="Masalan: Malika" 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Manzil <span style="color:var(--primary);">*</span></label>
                <input type="text" name="address" required placeholder="Masalan: Chilonzor, Kichik halqa yo'li" 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Xarita manzili (Google Maps URL)</label>
                <input type="url" name="map_url" placeholder="https://maps.google.com/..." 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Telefon raqami</label>
                <input type="text" name="phone" placeholder="+998 90 123 45 67" 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <button type="submit" class="btn-primary" style="padding:18px; font-size:18px; margin-top:20px; width:100%;">FILIALNI SAQLASH 🚀</button>
        </form>
    </div>
</div>
{% endblock %}
