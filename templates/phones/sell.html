{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="animate" style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-size:36px; font-weight:900; margin-bottom:10px;">📱 Telefon sotish</h1>
    <p style="color:var(--text-muted); font-weight:700; margin-bottom:40px;">E'loningizni joylang va tezda soting</p>

    <form method="POST" enctype="multipart/form-data" class="premium-card" style="padding: 40px; display:flex; flex-direction:column; gap:25px;">
        {% csrf_token %}
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">SARLAVHA</label>
                <input type="text" name="title" placeholder="Masalan: iPhone 14 Pro Max" required
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">MODEL</label>
                <input type="text" name="model_name" placeholder="iPhone 14 Pro" required
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">NARX (SO'M)</label>
                <input type="number" name="price" placeholder="12000000" required
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">XOTIRA</label>
                <select name="memory" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
                    <option value="64">64 GB</option>
                    <option value="128" selected>128 GB</option>
                    <option value="256">256 GB</option>
                    <option value="512">512 GB</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">BATAREYA HOLATI (%)</label>
                <input type="number" name="battery_health" value="90"
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">RASM YUKLASH</label>
                <input type="file" name="image" required
                       style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); font-size:12px;">
            </div>
        </div>

        <div>
            <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">TELEFON RAQAMINGIZ</label>
            <input type="tel" name="seller_phone" placeholder="+998 90 123 45 67" required
                   style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
        </div>

        <div>
            <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted);">QO'SHIMCHA MA'LUMOT</label>
            <textarea name="description" rows="4" placeholder="Holati haqida batafsil..."
                      style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700; resize:none;"></textarea>
        </div>

        <button type="submit" class="btn-primary" style="padding:20px; font-size:18px;">E'LONNI JOYLASHTIRISH 🚀</button>
    </form>
</div>
{% endblock %}
