{% extends "admin/base.html" %}

{% block title %}{{ title }} | Markab Admin{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Markab Boshqaruvi</a></h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

    /* Markab Milky Light Admin Theme */
    :root {
        --primary: #3b82f6;
        --secondary: #64748b;
        --accent: #f59e0b;
        --primary-fg: #ffffff;
        
        --body-fg: #334155;
        --body-bg: #f8fafc;
        --body-quiet-color: #64748b;
        --body-loud-color: #0f172a;
        
        --header-color: #ffffff;
        --header-branding-color: #ffffff;
        --header-bg: #2563eb;
        --header-link-color: #eff6ff;
        
        --breadcrumbs-fg: #64748b;
        --breadcrumbs-link-fg: #3b82f6;
        --breadcrumbs-bg: #ffffff;
        
        --link-fg: #3b82f6;
        --link-hover-color: #2563eb;
        --link-selected-fg: #5a5bb1;
        
        --hairline-color: #e2e8f0;
        --border-color: #e2e8f0;
        
        --error-fg: #ef4444;
        
        --message-success-bg: #dcfce7;
        --message-warning-bg: #fef9c3;
        --message-error-bg: #fee2e2;
        
        --darkened-bg: #f1f5f9; /* panel background */
        --selected-bg: #eff6ff;
        --selected-row: #eff6ff;
        
        --button-fg: #ffffff;
        --button-bg: #3b82f6;
        --button-hover-bg: #2563eb;
        --default-button-bg: #1d4ed8;
        --default-button-hover-bg: #1e3a8a;
    }

    body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }

    /* Override standard elements for modern look */
    #header {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .module {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
        border: 1px solid #e2e8f0;
        overflow: hidden;
        margin-bottom: 24px;
    }

    .module h2, .module caption, .inline-group h2 {
        background: #ffffff;
        color: #0f172a;
        font-weight: 800;
        padding: 16px 20px;
        border-bottom: 1px solid #e2e8f0;
        font-size: 15px;
        letter-spacing: 0.5px;
    }

    /* Buttons */
    input[type=submit], input[type=button], .button, .submit-row input, a.button {
        border-radius: 12px;
        font-weight: 700;
        text-transform: none;
        padding: 12px 24px;
        transition: all 0.2s;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    }
    
    /* Inputs */
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], input[type=tel], textarea, select, .vTextField {
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        padding: 10px 16px;
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        color: #334155;
        background-color: #f8fafc;
    }
    
    input[type=text]:focus, textarea:focus, select:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        outline: none;
        background-color: #ffffff;
    }

    /* Dashboard specific */
    .dashboard .module table th, .dashboard .module table td {
        padding: 12px 20px;
        border-bottom: 1px solid #f1f5f9;
    }
    
    .dashboard .module table th a {
        font-weight: 700;
    }
    
    #recent-actions-module h2 {
        background: #f8fafc;
    }
    
    /* Login Page */
    .login #container {
        border-radius: 24px;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border: 1px solid #e2e8f0;
    }
    .login #header {
        padding: 24px;
    }
</style>
{% endblock %}
