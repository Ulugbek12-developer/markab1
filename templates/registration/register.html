{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="animate" style="max-width: 500px; margin: 40px auto;">
    <div class="premium-card" style="padding: 40px;">
        <h1 style="font-size:32px; font-weight:900; margin-bottom:10px; text-align:center;">Ro'yxatdan o'tish</h1>
        <p style="color:var(--text-muted); font-weight:700; margin-bottom:30px; text-align:center;">Markab olamiga qo'shiling!</p>

        <form method="POST" style="display:flex; flex-direction:column; gap:20px;">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p style="color:#FF4D4D; font-size:10px; margin-top:5px; font-weight:700;">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
                <style>
                    /* Style the Django form inputs */
                    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-weight: 700; }
                </style>
            {% endfor %}

            <button type="submit" class="btn-primary" style="padding:18px; font-size:18px; margin-top:10px;">RO'YXATDAN O'TISH 🚀</button>
        </form>

        <div style="margin-top:30px; text-align:center; padding-top:20px; border-top:1px solid var(--border);">
            <p style="font-size:14px; color:var(--text-muted); font-weight:700;">
                Akkauntingiz bormi? <a href="{% url 'users:login' %}" style="color:var(--primary); text-decoration:none;">Kirish</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
