{% extends 'base.html' %}

{% block title %}Kirish | Markab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-10">
    <div class="bg-white rounded-3xl p-8 card-shadow border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 mb-2">Xush kelibsiz</h1>
            <p class="text-slate-500 font-medium">Tizimga kirish uchun ma'lumotlarni kiriting</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                <input type="text" name="username" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Parol</label>
                <input type="password" name="password" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            {% if form.errors %}
                <p class="text-red-500 text-sm font-bold text-center">Username yoki parol xato!</p>
            {% endif %}

            <button type="submit" class="w-full btn-primary py-5 text-lg shadow-2xl shadow-blue-200">
                Kirish
            </button>

            <div class="text-center">
                <p class="text-slate-400 text-sm">Profilingiz yo'qmi? <a href="/register" class="text-blue-600 font-bold">Ro'yxatdan o'tish</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
