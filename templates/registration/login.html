{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="animate" style="max-width: 500px; margin: 40px auto;">
    <div class="premium-card" style="padding: 40px;">
        <h1 style="font-size:32px; font-weight:900; margin-bottom:10px; text-align:center;">Kirish</h1>
        <p style="color:var(--text-muted); font-weight:700; margin-bottom:30px; text-align:center;">Xush kelibsiz! Hisobingizga kiring</p>

        <form method="POST" style="display:flex; flex-direction:column; gap:20px;">
            {% csrf_token %}
            
            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Login (Username)</label>
                <input type="text" name="username" required 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <div>
                <label style="display:block; font-size:12px; font-weight:900; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase;">Parol</label>
                <input type="password" name="password" required 
                       style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
            </div>

            <button type="submit" class="btn-primary" style="padding:18px; font-size:18px; margin-top:10px;">KIRISH 🚀</button>
        </form>

        <div style="margin-top:30px; text-align:center; padding-top:20px; border-top:1px solid var(--border);">
            <p style="font-size:14px; color:var(--text-muted); font-weight:700;">
                Akkauntingiz yo'qmi? <a href="{% url 'users:register' %}" style="color:var(--primary); text-decoration:none;">Ro'yxatdan o'tish</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
