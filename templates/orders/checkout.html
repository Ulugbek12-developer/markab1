{% extends 'base.html' %}

{% block title %}Buyurtma berish | Markab{% endblock %}

{% block content %}
<div class="animate" style="max-width: 800px; margin: 40px auto;" x-data="checkoutApp()">
    <div class="premium-card" style="padding: 0; overflow: hidden;">
        
        <!-- Product Header -->
        <div style="background: rgba(177, 34, 65, 0.05); padding: 30px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid var(--border);">
            <div style="width: 100px; height: 100px; background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); padding: 10px; display:flex; align-items:center; justify-content:center;">
                {% if listing.image %}
                    <img src="{{ listing.image.url }}" style="width: 100%; height: 100%; object-fit: contain;">
                {% endif %}
            </div>
            <div>
                <h2 style="font-size: 28px; font-weight: 900; margin-bottom: 5px;">{{ listing.title }}</h2>
                <p style="color: var(--primary); font-size: 24px; font-weight: 900;">{{ listing.price|floatformat:0 }} so'm</p>
            </div>
        </div>

        <form method="POST" style="padding: 40px; display: flex; flex-direction: column; gap: 30px;">
            {% csrf_token %}
            
            <!-- Contact Info -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">F.I.O</label>
                    <input type="text" name="name" required placeholder="Ismingizni kiriting" style="width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border); background: #F9F9F9; font-weight: 700; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TELEFON</label>
                    <input type="tel" name="phone" required placeholder="+998 90 123 45 67" style="width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border); background: #F9F9F9; font-weight: 700; outline: none;">
                </div>
            </div>

            <!-- Payment Type -->
            <div>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <label style="font-size: 12px; font-weight: 900; color: var(--text-muted); text-transform: uppercase;">To'lov turi</label>
                    <div style="display: flex; background: #F9F9F9; padding: 5px; border-radius: 16px; border: 1px solid var(--border);">
                        <button type="button" @click="paymentType = 'cash'" :style="paymentType === 'cash' ? 'background:white; color:var(--text-main); box-shadow:0 5px 15px rgba(0,0,0,0.05);' : 'background:transparent; color:var(--text-muted);'" style="padding: 10px 20px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: all 0.3s;">Naqd pul</button>
                        <button type="button" @click="paymentType = 'installment'" :style="paymentType === 'installment' ? 'background:var(--primary); color:white; box-shadow:0 5px 15px rgba(177,34,65,0.2);' : 'background:transparent; color:var(--text-muted);'" style="padding: 10px 20px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: all 0.3s;">Muddatli to'lov</button>
                    </div>
                    <input type="hidden" name="is_installment" :value="paymentType === 'installment' ? 'on' : 'off'">
                </div>

                <!-- Installment Options -->
                <div x-show="paymentType === 'installment'" style="display:none; background: rgba(177, 34, 65, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(177, 34, 65, 0.1); margin-top: 20px;">
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; font-size: 12px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 15px;">Muddatni tanlang</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                            <template x-for="m in [3, 6, 12]" :key="m">
                                <button type="button" @click="months = m"
                                        style="padding: 15px; border-radius: 16px; font-weight: 900; border: 2px solid; cursor: pointer; transition: all 0.3s;"
                                        :style="months === m ? 'background:white; border-color:var(--primary); color:var(--primary); box-shadow:0 10px 20px rgba(177,34,65,0.1);' : 'background:rgba(255,255,255,0.5); border-color:transparent; color:var(--text-muted);'">
                                    <span x-text="m + ' oy'"></span>
                                </button>
                            </template>
                        </div>
                        <input type="hidden" name="months" :value="months">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="display: block; font-size: 12px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 10px;">Boshlang'ich to'lov (so'm)</label>
                        <input type="number" name="initial_payment" x-model.number="initialPayment" style="width: 100%; padding: 15px; border-radius: 16px; border: none; font-size: 18px; font-weight: 900; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                    </div>

                    <!-- Calculation Table -->
                    <div style="background: white; border-radius: 20px; padding: 25px; border: 1px solid rgba(177, 34, 65, 0.1); box-shadow: 0 15px 35px rgba(177, 34, 65, 0.05);">
                        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px;">
                            <span>Mahsulot:</span>
                            <span style="color: var(--text-main);" x-text="formatPrice(basePrice) + ' so\'m'"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px;">
                            <span>Boshlang'ich to'lov:</span>
                            <span style="color: var(--primary);" x-text="'- ' + formatPrice(initialPayment || 0) + ' so\'m'"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 20px;">
                            <span>Qolgan summa:</span>
                            <span style="color: var(--text-main);" x-text="formatPrice(getRemaining()) + ' so\'m'"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(177, 34, 65, 0.1);">
                            <span style="font-size: 16px; font-weight: 900; text-transform: uppercase;">Har oylik to'lov:</span>
                            <span style="font-size: 28px; font-weight: 900; color: var(--primary);" x-text="formatPrice(getMonthly()) + ' so\'m'"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Delivery -->
            <div>
                <label style="display: block; font-size: 12px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px;">Yetkazib berish</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button type="button" @click="deliveryType = 'pickup'" :style="deliveryType === 'pickup' ? 'background:var(--text-main); color:white; box-shadow:0 10px 20px rgba(0,0,0,0.1);' : 'background:#F9F9F9; color:var(--text-muted);'" style="padding: 20px; border-radius: 16px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        🏠 Do'kondan
                    </button>
                    <button type="button" @click="deliveryType = 'delivery'" :style="deliveryType === 'delivery' ? 'background:var(--primary); color:white; box-shadow:0 10px 20px rgba(177,34,65,0.2);' : 'background:#F9F9F9; color:var(--text-muted);'" style="padding: 20px; border-radius: 16px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        🚚 Dastavka
                    </button>
                    <input type="hidden" name="delivery_type" :value="deliveryType">
                </div>
                
                <div x-show="deliveryType === 'delivery'" style="display:none; margin-top: 15px;">
                    <textarea name="address" placeholder="To'liq manzilingizni kiriting..." style="width: 100%; padding: 20px; border-radius: 16px; border: 1px solid var(--border); background: #F9F9F9; font-weight: 700; outline: none; resize: none;" rows="3"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 20px; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;">
                TASDIQLASH
            </button>
        </form>
    </div>
</div>

<script>
function checkoutApp() {
    return {
        basePrice: {{ listing.price }},
        paymentType: '{{ payment_type }}',
        months: 6,
        initialPayment: 0,
        deliveryType: 'pickup',
        
        getRemaining() {
            return Math.max(0, this.basePrice - (this.initialPayment || 0));
        },
        
        getInterest() {
            let rate = 0;
            if (this.months === 3) rate = 0.10;
            else if (this.months === 6) rate = 0.15;
            else if (this.months === 12) rate = 0.25;
            return Math.round(this.getRemaining() * rate);
        },
        
        getTotal() {
            return this.getRemaining() + this.getInterest();
        },
        
        getMonthly() {
            return Math.round(this.getTotal() / this.months);
        },
        
        formatPrice(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }
    }
}
</script>
{% endblock %}
