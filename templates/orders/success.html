{% extends 'base.html' %}

{% block title %}Muvaffaqiyatli | Markab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-24 px-4 text-center">
    <div class="bg-white rounded-[2.5rem] p-12 card-shadow border border-red-50 space-y-8">
        <div class="w-28 h-28 bg-red-50 text-primary rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-xl shadow-red-100/50">
            <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-3">Muvaffaqiyatli!</h1>
            <p class="text-slate-400 font-black text-xs uppercase tracking-widest leading-relaxed">
                Buyurtmangiz qabul qilindi. Tez orada operatorlarimiz siz bilan bog'lanishadi.
            </p>
        </div>
        <div class="pt-4">
            <a href="{% url 'phones:home' %}" class="block w-full bg-primary text-white font-black py-5 rounded-2xl shadow-2xl shadow-red-100 transition-all hover:bg-accent active:scale-95">
                ASOSIY SAHIFAGA QAYTISH
            </a>
        </div>
    </div>
</div>
{% endblock %}
